name: CI Pipeline
 
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
 
jobs:
  name: Koodi kobtroll
  runs-on: ubuntu-latest

  steps:
    - name: Lae kood alla
    - uses: actions/checkout@v4
 
    - name: Paigalda Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '20'
    - name: paigalda sõltuvused 
      run: npm install

    - name:  kobtroll vigu
      run: node --check src/server.js src/routes/users.js src/routes/menu.js src/routes/order.js
  test: 
    name: Automaattestid
    runs-on: ubuntu-latest
   
    - name: Paigalda sõltuvused
    run: npm install
 
    - name: Käivitame rakenduse
    run: node src/server.js &
 
    - name: Oota kuni server käivitub
    run: sleep 3
 
    - name: Käivitame testid
    run: node src/tets.js