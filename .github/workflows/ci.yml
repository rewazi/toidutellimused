name: CI pipeline

on:
  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test, build, lint]
    if: github.ref == 'refs/head/master'
    steps:
      - name: Lae kood alla
        uses: actions/checkout@v4

      - name: Teata edukast deployst
        run: | 
          echo "Kõik testid läbisid!"
          echo "Rakendus on valmis"
          echo "Keskkond: production"
          echo "Commit: ${{ github.sha }}"
  build:
    name: Docker build kontroll
    runs-on: ubuntu-latest
    steps:
      - name: Lae kood alla
        uses: actions/checkout@v4

      - name: Ehita dev image
        run: docker compose --profile dev build

      - name: Ehita prod image
        run: docker compose --profile prod build
  lint:      
    name: Koodi kontroll
    runs-on: ubuntu-latest
    steps: 
      - name: Lae kood alla
        uses: actions/checkout@v4
      
      - name: Paigalda Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Paigalda sõltuvused
        run: npm install

      - name: Kontrolli üntaksi vigu
        run: node --check src/server.js src/routes/users.js src/routes/menu.js src/routes/orders.js

  test:
    name: Automaattestid
    runs-on: ubuntu-latest

    steps:
      - name: Lae kood alla
        uses: actions/checkout@v4

      - name: Paigalda Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Paigalda sõltuvused
        run: npm install

      - name: Käivita server
        run: node src/server.js &

      - name: Oota serveri käivitumist
        run: sleep 3

      - name: Käivita testid
        run: node src/test.js