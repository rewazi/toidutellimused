name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Automaattestid
    runs-on: ubuntu-latest

    steps:
      - name: Lae kood alla
        uses: actions/checkout@v4

      - name: Paigalda Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Paigalda sõltuvused
        run: npm install

      - name: Kontrolli ühtaksi vigu
        run: node --check src/server.js src/routes/users.js src/routes/menu.js src/routes/order.js

      - name: Käivita rakendus
        run: node src/server.js &

      - name: Oota kuni server käivitub
        run: sleep 3

      - name: Käivita testid
        run: node src/test.js